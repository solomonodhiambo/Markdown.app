<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MarkItDown</title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14171b;
    --border: #262b31;
    --accent: #5eead4;
    --accent-dim: #2dd4bf33;
    --text: #e6e8eb;
    --muted: #8a929c;
    --error: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    display: flex;
    justify-content: center;
    padding: 24px 16px 60px;
  }
  .app {
    width: 100%;
    max-width: 780px;
  }
  header {
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 1.4rem;
    margin: 0 0 4px;
    letter-spacing: -0.02em;
  }
  header p {
    color: var(--muted);
    margin: 0;
    font-size: 0.9rem;
  }
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--muted);
    transition: all 0.15s ease;
  }
  .tab.active {
    background: var(--accent-dim);
    color: var(--accent);
    font-weight: 600;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .hidden { display: none !important; }
  input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #0e1013;
    color: var(--text);
    font-size: 0.95rem;
  }
  input[type="text"]:focus { outline: 1px solid var(--accent); }
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.9rem;
  }
  .dropzone.drag { border-color: var(--accent); color: var(--accent); }
  button.primary {
    margin-top: 14px;
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: #06231f;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
  }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .filename {
    margin-top: 10px;
    font-size: 0.85rem;
    color: var(--accent);
    word-break: break-all;
  }
  .status {
    margin-top: 14px;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .status.error { color: var(--error); }
  .result {
    margin-top: 20px;
  }
  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .result-header h3 {
    font-size: 0.85rem;
    color: var(--muted);
    margin: 0;
    font-weight: 500;
  }
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  pre {
    background: #0e1013;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    max-height: 480px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 0.82rem;
    line-height: 1.5;
  }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>MarkItDown</h1>
    <p>Convert YouTube links or files into clean Markdown, powered by Microsoft's markitdown.</p>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="youtube">YouTube link</div>
    <div class="tab" data-tab="file">Upload file</div>
  </div>

  <div class="panel">
    <div id="tab-youtube">
      <input type="text" id="yt-url" placeholder="https://www.youtube.com/watch?v=..." />
      <button class="primary" id="yt-submit">Convert</button>
    </div>

    <div id="tab-file" class="hidden">
      <div class="dropzone" id="dropzone">
        Tap to choose a file, or drag one here<br />
        <span style="font-size:0.78rem;">PDF, DOCX, PPTX, XLSX, CSV, images, audio, HTML, ZIP, and more</span>
        <input type="file" id="file-input" class="hidden" />
      </div>
      <div class="filename hidden" id="filename"></div>
      <button class="primary" id="file-submit" disabled>Convert</button>
    </div>

    <div class="status hidden" id="status"></div>

    <div class="result hidden" id="result">
      <div class="result-header">
        <h3 id="result-source"></h3>
        <button class="copy-btn" id="copy-btn">Copy</button>
      </div>
      <pre id="result-md"></pre>
    </div>
  </div>
</div>

<script>
  const tabs = document.querySelectorAll(".tab");
  const tabYoutube = document.getElementById("tab-youtube");
  const tabFile = document.getElementById("tab-file");
  const statusEl = document.getElementById("status");
  const resultEl = document.getElementById("result");
  const resultMd = document.getElementById("result-md");
  const resultSource = document.getElementById("result-source");

  tabs.forEach(tab => {
    tab.addEventListener("click", () => {
      tabs.forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      const isYt = tab.dataset.tab === "youtube";
      tabYoutube.classList.toggle("hidden", !isYt);
      tabFile.classList.toggle("hidden", isYt);
      hideStatus();
      resultEl.classList.add("hidden");
    });
  });

  function showStatus(msg, isError = false) {
    statusEl.textContent = msg;
    statusEl.classList.remove("hidden");
    statusEl.classList.toggle("error", isError);
  }
  function hideStatus() {
    statusEl.classList.add("hidden");
  }

  function renderResult(source, markdown) {
    resultSource.textContent = source;
    resultMd.textContent = markdown;
    resultEl.classList.remove("hidden");
  }

  // --- YouTube tab ---
  const ytSubmit = document.getElementById("yt-submit");
  const ytUrl = document.getElementById("yt-url");

  ytSubmit.addEventListener("click", async () => {
    const url = ytUrl.value.trim();
    if (!url) { showStatus("Paste a YouTube URL first.", true); return; }

    resultEl.classList.add("hidden");
    ytSubmit.disabled = true;
    showStatus("Converting video…");

    try {
      const formData = new FormData();
      formData.append("url", url);
      const res = await fetch("/convert/youtube", { method: "POST", body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Conversion failed.");
      hideStatus();
      renderResult(data.source, data.markdown);
    } catch (err) {
      showStatus(err.message, true);
    } finally {
      ytSubmit.disabled = false;
    }
  });

  // --- File tab ---
  const dropzone = document.getElementById("dropzone");
  const fileInput = document.getElementById("file-input");
  const filenameEl = document.getElementById("filename");
  const fileSubmit = document.getElementById("file-submit");
  let selectedFile = null;

  dropzone.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", () => {
    if (fileInput.files.length) setFile(fileInput.files[0]);
  });
  ["dragover", "dragleave", "drop"].forEach(evt => {
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      dropzone.classList.toggle("drag", evt === "dragover");
      if (evt === "drop" && e.dataTransfer.files.length) {
        setFile(e.dataTransfer.files[0]);
      }
    });
  });

  function setFile(file) {
    selectedFile = file;
    filenameEl.textContent = file.name;
    filenameEl.classList.remove("hidden");
    fileSubmit.disabled = false;
  }

  fileSubmit.addEventListener("click", async () => {
    if (!selectedFile) return;
    resultEl.classList.add("hidden");
    fileSubmit.disabled = true;
    showStatus("Converting file…");

    try {
      const formData = new FormData();
      formData.append("file", selectedFile);
      const res = await fetch("/convert/file", { method: "POST", body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Conversion failed.");
      hideStatus();
      renderResult(data.source, data.markdown);
    } catch (err) {
      showStatus(err.message, true);
    } finally {
      fileSubmit.disabled = false;
    }
  });

  // --- Copy button ---
  document.getElementById("copy-btn").addEventListener("click", () => {
    navigator.clipboard.writeText(resultMd.textContent);
    const btn = document.getElementById("copy-btn");
    const original = btn.textContent;
    btn.textContent = "Copied!";
    setTimeout(() => (btn.textContent = original), 1200);
  });
</script>
</body>
</html>
